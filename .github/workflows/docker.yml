name: Build and push Docker image

on:
  push:
    branches:
      - staging
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "DEPLOYMENT.md"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name, tags and build args
        id: meta
        run: |
          IMAGE="$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=${IMAGE}:prod,${IMAGE}:latest" >> "$GITHUB_OUTPUT"
            echo "api_url=https://api.aimena.ru/api/v1" >> "$GITHUB_OUTPUT"
            echo "app_url=https://aimena.ru" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:staging" >> "$GITHUB_OUTPUT"
            echo "api_url=https://api-staging.aimena.ru/api/v1" >> "$GITHUB_OUTPUT"
            echo "app_url=https://staging.aimena.ru" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.meta.outputs.api_url }}
            NEXT_PUBLIC_APP_URL=${{ steps.meta.outputs.app_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy deploy
        if: github.ref_name == 'staging'
        env:
          DOKPLOY_DEPLOY_HOOK: ${{ secrets.DOKPLOY_DEPLOY_HOOK }}
        run: |
          if [ -z "$DOKPLOY_DEPLOY_HOOK" ]; then
            echo "Secret DOKPLOY_DEPLOY_HOOK is not set — skip deploy"
            exit 0
          fi
          curl -fsS -X POST "$DOKPLOY_DEPLOY_HOOK"
          echo "Dokploy deploy triggered"
